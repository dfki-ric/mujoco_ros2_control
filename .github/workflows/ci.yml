name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    env:
      ROS_DISTRO: jazzy
      DEBIAN_FRONTEND: noninteractive
      DISABLE_OPENGL: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libglfw3-dev \
            libx11-dev \
            xorg-dev \
            ros-${ROS_DISTRO}-urdf \
            ros-${ROS_DISTRO}-xacro \
            ros-${ROS_DISTRO}-rviz2 \
            ros-${ROS_DISTRO}-ros2-control \
            ros-${ROS_DISTRO}-ros2-controllers \
            ros-${ROS_DISTRO}-controller-manager \
            ros-${ROS_DISTRO}-pcl-ros \
            ros-${ROS_DISTRO}-perception-pcl \
            ros-${ROS_DISTRO}-urdfdom-py \
            libopencv-dev \
            ros-${ROS_DISTRO}-pcl-conversions \
            ros-${ROS_DISTRO}-cv-bridge \
            libpcl-dev \
            python3-scipy

      - name: Set up workspace
        run: |
          mkdir -p /ros2_ws/src
          cp -r mujoco_ros2_control /ros2_ws/src/

      - name: Resolve rosdep dependencies
        working-directory: /ros2_ws
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro $ROS_DISTRO -y

      - name: Build
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          colcon build --packages-select mujoco_ros2_control

      - name: Test
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test --packages-select mujoco_ros2_control --event-handlers console_direct+
          colcon test-result --test-result-base build/mujoco_ros2_control/test_results --verbose
