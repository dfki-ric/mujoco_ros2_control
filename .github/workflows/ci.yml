name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    env:
      ROS_DISTRO: jazzy
      DEBIAN_FRONTEND: noninteractive
      DISABLE_OPENGL: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Only the deps rosdep cannot resolve: the MuJoCo simulate GUI build
      # headers (X11/Wayland/cmake-modules). Everything else (incl. urdfdom_py
      # and scipy) is declared in package.xml and handled by rosdep.
      - name: Install non-rosdep system dependencies
        run: |
          apt-get update
          apt-get install -y \
            libx11-dev \
            xorg-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            extra-cmake-modules

      - name: Set up workspace
        run: |
          mkdir -p /ros2_ws/src
          cp -r mujoco_ros2_control /ros2_ws/src/

      - name: Resolve rosdep dependencies
        working-directory: /ros2_ws
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro $ROS_DISTRO -y

      - name: Build
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          colcon build --packages-select mujoco_ros2_control

      - name: Test
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test --packages-select mujoco_ros2_control --event-handlers console_direct+
          colcon test-result --test-result-base build/mujoco_ros2_control/test_results --verbose
