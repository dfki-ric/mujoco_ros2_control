name: CI Examples

on:
  push:
  pull_request:

jobs:
  build-and-test-examples:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    env:
      ROS_DISTRO: jazzy
      DEBIAN_FRONTEND: noninteractive
      DISABLE_OPENGL: "0"
      EGL_PLATFORM: surfaceless
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install non-rosdep system dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            libx11-dev \
            xorg-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            extra-cmake-modules

      - name: Install Mesa software rendering (EGL/llvmpipe)
        run: |
          apt-get install -y \
            libegl1 \
            libglvnd0 \
            libopengl0 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            mesa-utils

      - name: Verify EGL software context
        run: |
          eglinfo -B || eglinfo || true

      - name: Set up workspace
        run: |
          mkdir -p /ros2_ws/src
          cp -r mujoco_ros2_control /ros2_ws/src/
          cp -r mujoco_ros2_control_examples /ros2_ws/src/

          git clone -b jazzy https://github.com/frankarobotics/franka_description.git /ros2_ws/src/franka_description

      - name: Resolve rosdep dependencies
        working-directory: /ros2_ws
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src --rosdistro $ROS_DISTRO -y

      - name: Build
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          colcon build --packages-up-to mujoco_ros2_control_examples

      - name: Test Examples
        working-directory: /ros2_ws
        shell: bash
        run: |
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test --packages-select mujoco_ros2_control_examples --event-handlers console_direct+
          colcon test-result --test-result-base build/mujoco_ros2_control_examples/test_results --verbose