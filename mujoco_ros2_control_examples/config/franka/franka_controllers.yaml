controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    ft_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    gears_large_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster
    gears_medium_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster
    gears_small_pose_broadcaster:
      type: pose_broadcaster/PoseBroadcaster

    fer_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    fp3_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    fr3_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    fer_franka_hand_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    fp3_franka_hand_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    fr3_franka_hand_joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

fer_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fer_joint1
      - fer_joint2
      - fer_joint3
      - fer_joint4
      - fer_joint5
      - fer_joint6
      - fer_joint7

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

fp3_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fp3_joint1
      - fp3_joint2
      - fp3_joint3
      - fp3_joint4
      - fp3_joint5
      - fp3_joint6
      - fp3_joint7

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

fr3_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

fer_franka_hand_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fer_finger_joint1

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

fp3_franka_hand_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fp3_finger_joint1

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

fr3_franka_hand_joint_trajectory_controller:
  ros__parameters:
    joints:
      - fr3_finger_joint1

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

# The sensor_name must match "<arm_id>_ft_sensor" from the URDF.
# Adjust if using a different arm_id (fer, fp3).
ft_sensor_broadcaster:
  ros__parameters:
    sensor_name: "fr3_ft_sensor"
    frame_id: "fr3_link7"

gears_large_pose_broadcaster:
  ros__parameters:
    pose_name: "gears_large_pose"
    frame_id: "world"
    tf:
      enable: true
      child_frame_id: "gears_large_link"

gears_medium_pose_broadcaster:
  ros__parameters:
    pose_name: "gears_medium_pose"
    frame_id: "world"
    tf:
      enable: true
      child_frame_id: "gears_medium_link"

gears_small_pose_broadcaster:
  ros__parameters:
    pose_name: "gears_small_pose"
    frame_id: "world"
    tf:
      enable: true
      child_frame_id: "gears_small_link"

# Site depth camera (site "mjCam_camera" in mujoco_camera.urdf.xacro -> node
# "camera", topics /camera/color/... and /camera/depth/...). Mounted in
# camera_optical_frame, so the published frame_id is that optical frame and the
# point cloud is oriented correctly. enabled must be true for the site camera to
# spawn (unlike the legacy <camera> element, which was always created).
camera:
  ros__parameters:
    enabled: true
    frequency: 30.0
    width: 640
    height: 480
    fovy: 45.0
    color_image: true
    depth_image: true
    point_cloud: true
